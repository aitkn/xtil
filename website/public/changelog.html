<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — xTil</title>
  <meta name="description" content="What's new in xTil — release notes and user-facing improvements to the Chrome extension.">
  <meta name="theme-color" content="#faf6ee" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#15120f" media="(prefers-color-scheme: dark)">
  <meta property="og:title" content="Changelog — xTil">
  <meta property="og:description" content="What's new in xTil — release notes and user-facing improvements.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://xtil.ai/changelog.html">
  <meta property="og:image" content="https://xtil.ai/store/promo-marquee-1400x560.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://xtil.ai/store/promo-marquee-1400x560.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=gambarino@1&f[]=supreme@300,400,500,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      color-scheme: light dark;

      --bg-deep:       oklch(97.5% 0.01 75);
      --bg:            oklch(96% 0.012 72);
      --surface:       oklch(98.5% 0.008 75);
      --surface-light: oklch(99.2% 0.005 75);
      --border:        oklch(88% 0.012 70);
      --primary:       oklch(52% 0.14 32);
      --primary-bright:oklch(58% 0.15 32);
      --accent:        var(--primary);
      --glow:          var(--primary);
      --text:          oklch(18% 0.012 55);
      --text-secondary:oklch(38% 0.014 58);
      --text-muted:    oklch(52% 0.016 62);
      --emerald:       oklch(52% 0.11 155);

      --font-display: 'Gambarino', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
      --font-body: 'Supreme', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;

      --fs-body: 1.0625rem;
      --lh-body: 1.62;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-deep:       oklch(13% 0.008 55);
        --bg:            oklch(15% 0.008 55);
        --surface:       oklch(17% 0.01 55);
        --surface-light: oklch(20% 0.01 55);
        --border:        oklch(28% 0.012 58);
        --primary:       oklch(64% 0.13 32);
        --primary-bright:oklch(70% 0.14 32);
        --accent:        var(--primary);
        --glow:          var(--primary);
        --text:          oklch(94% 0.01 80);
        --text-secondary:oklch(78% 0.012 72);
        --text-muted:    oklch(62% 0.014 68);
        --emerald:       oklch(70% 0.12 155);
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-size: var(--fs-body);
      font-feature-settings: 'ss01', 'ss02', 'cv01', 'cv11';
      color: var(--text);
      background: var(--bg-deep);
      line-height: var(--lh-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--primary-bright); }

    .container { max-width: 1100px; width: 100%; margin: 0 auto; padding: 0 28px; min-width: 0; }

    /* ─── Nav ─── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 0 28px;
      background: color-mix(in oklch, var(--bg-deep) 82%, transparent);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    nav .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 1.75rem;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .nav-brand img { width: 48px; height: 48px; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); text-decoration: none; }
    .nav-cta {
      background: var(--primary) !important;
      color: #fff !important;
      padding: 8px 20px;
      border-radius: 8px;
      font-weight: 600 !important;
      font-size: 0.88rem !important;
      transition: background 0.2s, box-shadow 0.2s !important;
    }
    .nav-cta:hover {
      background: var(--primary-bright) !important;
    }

    /* ─── Changelog content ─── */
    .changelog {
      padding: 120px 0 80px;
    }
    .changelog-header {
      margin-bottom: 48px;
    }
    .changelog-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.25rem, 1.5rem + 3vw, 3.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .changelog-header p {
      font-family: var(--font-body);
      color: var(--text-secondary);
      font-size: 1.125rem;
      line-height: 1.55;
    }
    .changelog-header p a {
      color: var(--text-muted);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .changelog-header p a:hover { color: var(--text); }

    /* Rendered markdown */
    .changelog-body h2 {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.015em;
      line-height: 1.2;
      margin-top: 56px;
      margin-bottom: 4px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      color: var(--primary-bright);
    }
    .changelog-body h2:first-child {
      margin-top: 0;
    }
    .changelog-body p {
      margin: 8px 0 12px;
      color: var(--text-muted);
      font-size: 0.95rem;
      font-style: italic;
    }
    .changelog-body ul {
      list-style: none;
      padding: 0;
      margin: 0 0 32px;
    }
    .changelog-body li {
      position: relative;
      padding: 8px 0 8px 24px;
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text);
      border-bottom: 1px solid color-mix(in oklch, var(--border) 60%, transparent);
    }
    .changelog-body li:last-child {
      border-bottom: none;
    }
    .changelog-body li::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 15px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .changelog-body a {
      color: var(--accent);
    }
    .changelog-body hr {
      display: none;
    }
    /* Hide the H1 title from the rendered markdown — we have our own */
    .changelog-body > h1:first-child,
    .changelog-body > h1:first-child + p {
      display: none;
    }
    .changelog-body strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Loading / error states */
    .changelog-loading {
      color: var(--text-muted);
      font-size: 0.95rem;
      padding: 40px 0;
    }
    .changelog-error {
      color: var(--text-muted);
      font-size: 0.95rem;
      padding: 40px 0;
      background: var(--surface);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
    }

    /* ─── Footer ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
    }
    footer .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    footer .copy {
      color: #4a4562;
      font-size: 0.82rem;
      font-weight: 400;
    }
    footer .links { display: flex; gap: 24px; }
    footer .links a {
      color: #4a4562;
      font-size: 0.82rem;
      font-weight: 400;
    }
    footer .links a:hover { color: var(--text-muted); }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .container { padding: 0 20px; }
      nav { padding: 0 20px; }
      .nav-links { gap: 16px; }
      .nav-links a[href="/#features"],
      .nav-links a[href="/#how-it-works"] { display: none; }
      .nav-cta { display: none !important; }
      .changelog-header h1 { font-size: 1.7rem; }
      .changelog-body h2 { font-size: 1.25rem; }
      footer .container { flex-direction: column; text-align: center; }
      footer .links { flex-wrap: wrap; justify-content: center; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 16px; }
      nav { padding: 0 16px; }
      .nav-links { display: none; }
      .nav-brand { font-size: 1.4rem; }
      .nav-brand img { width: 38px; height: 38px; }
      .changelog { padding: 90px 0 60px; }
      .changelog-header h1 { font-size: 1.4rem; }
      .changelog-body h2 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<nav id="nav">
  <div class="nav-inner">
    <div style="display:flex;align-items:center;gap:0;">
      <a class="nav-brand" href="/">
        <img src="/icon.svg" alt="xTil">
        xTil
      </a><a href="https://buymeacoffee.com/xtil" target="_blank" rel="noopener" title="Support development" style="display:inline-flex;margin-left:30px;color:var(--text-muted);transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"><svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></a>
    </div>
    <div class="nav-links">
      <a href="/#features">Features</a>
      <a href="/#how-it-works">How it works</a>
      <a href="https://github.com/aitkn/xtil">GitHub</a>
      <a class="nav-cta" href="https://chromewebstore.google.com/detail/pikdhogjjbaakcpedmahckhmajdgdeon" target="_blank" rel="noopener">Install</a>
    </div>
  </div>
</nav>

<section class="changelog">
  <div class="container">
    <div class="changelog-header">
      <h1>What's New</h1>
      <p>Release notes for xTil. Source: <a href="https://github.com/aitkn/xtil/blob/master/CHANGELOG.md">CHANGELOG.md</a></p>
    </div>
    <div id="changelog-content" class="changelog-body">
      <div class="changelog-loading">Loading changelog&hellip;</div>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <span class="copy">&copy; 2026 xTil</span>
    <div class="links">
      <a href="https://buymeacoffee.com/xtil" target="_blank" rel="noopener">&#9749; Support Development</a>
      <a href="https://github.com/aitkn/xtil">GitHub</a>
      <a href="https://github.com/aitkn/xtil/issues">Issues</a>
      <a href="https://chromewebstore.google.com/detail/pikdhogjjbaakcpedmahckhmajdgdeon" target="_blank" rel="noopener">Chrome Web Store</a>
    </div>
  </div>
</footer>

<script type="module">
  import { marked } from 'https://cdn.jsdelivr.net/npm/marked@15/lib/marked.esm.js';

  const container = document.getElementById('changelog-content');
  const RAW_URL = 'https://raw.githubusercontent.com/aitkn/xtil/master/CHANGELOG.md';

  try {
    const res = await fetch(RAW_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    container.innerHTML = marked.parse(md);
  } catch (err) {
    container.innerHTML = `
      <div class="changelog-error">
        Could not load changelog from GitHub. You can
        <a href="https://github.com/aitkn/xtil/blob/master/CHANGELOG.md">view it directly on GitHub</a>.
      </div>`;
  }
</script>

</body>
</html>
