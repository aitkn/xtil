<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 90" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14110d"/>
      <stop offset="50%" stop-color="#1e1b17"/>
      <stop offset="100%" stop-color="#14110d"/>
    </linearGradient>
    <radialGradient id="glowL" cx="20%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#e39280" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e39280" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="78%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#b04a34" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#b04a34" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="500" height="90" fill="url(#bg)"/>
  <rect width="500" height="90" fill="url(#glowL)"/>
  <rect width="500" height="90" fill="url(#glowR)"/>

  <!-- Initial qubit states -->
  <g font-family="'Iowan Old Style', Georgia, serif" font-style="italic" fill="#d3cdc1" font-size="11">
    <text x="10" y="22">|0⟩</text>
    <text x="10" y="49">|0⟩</text>
    <text x="10" y="76">|0⟩</text>
  </g>

  <!-- Qubit wires -->
  <g stroke="#6a655c" stroke-width="0.5">
    <line x1="36" y1="18" x2="205" y2="18"/>
    <line x1="36" y1="45" x2="205" y2="45"/>
    <line x1="36" y1="72" x2="205" y2="72"/>
  </g>

  <!-- Hadamard on q1 -->
  <rect x="48" y="10" width="16" height="16" rx="2" fill="#7a2d1e" stroke="#e39280" stroke-width="0.8"/>
  <text x="56" y="22" text-anchor="middle" font-family="'Iowan Old Style', Georgia, serif" font-size="11" font-weight="500" fill="#fbe4dc">H</text>

  <!-- CNOT q1 → q2 -->
  <g stroke="#e39280">
    <line x1="95" y1="18" x2="95" y2="45" stroke-width="0.9"/>
    <circle cx="95" cy="18" r="2.8" fill="#e39280" stroke="none"/>
    <circle cx="95" cy="45" r="6" fill="#1e1b17" stroke-width="0.9"/>
    <line x1="89" y1="45" x2="101" y2="45" stroke-width="0.7"/>
    <line x1="95" y1="39" x2="95" y2="51" stroke-width="0.7"/>
  </g>

  <!-- CNOT q2 → q3 -->
  <g stroke="#e39280">
    <line x1="135" y1="45" x2="135" y2="72" stroke-width="0.9"/>
    <circle cx="135" cy="45" r="2.8" fill="#e39280" stroke="none"/>
    <circle cx="135" cy="72" r="6" fill="#1e1b17" stroke-width="0.9"/>
    <line x1="129" y1="72" x2="141" y2="72" stroke-width="0.7"/>
    <line x1="135" y1="66" x2="135" y2="78" stroke-width="0.7"/>
  </g>

  <!-- Measurement gates -->
  <g>
    <g transform="translate(175, 10)">
      <rect width="16" height="16" rx="2" fill="#1e1b17" stroke="#d3cdc1" stroke-width="0.7"/>
      <path d="M 3 12 A 5 5 0 0 1 13 12" stroke="#d3cdc1" stroke-width="0.7" fill="none"/>
      <line x1="8" y1="12" x2="12.3" y2="5" stroke="#e39280" stroke-width="0.9"/>
    </g>
    <g transform="translate(175, 37)">
      <rect width="16" height="16" rx="2" fill="#1e1b17" stroke="#d3cdc1" stroke-width="0.7"/>
      <path d="M 3 12 A 5 5 0 0 1 13 12" stroke="#d3cdc1" stroke-width="0.7" fill="none"/>
      <line x1="8" y1="12" x2="12.3" y2="5" stroke="#e39280" stroke-width="0.9"/>
    </g>
    <g transform="translate(175, 64)">
      <rect width="16" height="16" rx="2" fill="#1e1b17" stroke="#d3cdc1" stroke-width="0.7"/>
      <path d="M 3 12 A 5 5 0 0 1 13 12" stroke="#d3cdc1" stroke-width="0.7" fill="none"/>
      <line x1="8" y1="12" x2="12.3" y2="5" stroke="#e39280" stroke-width="0.9"/>
    </g>
  </g>

  <!-- Section divider -->
  <line x1="222" y1="20" x2="222" y2="70" stroke="#4a443c" stroke-width="0.5" opacity="0.7"/>

  <!-- Superposition formula -->
  <text x="240" y="53" font-family="'Iowan Old Style', Georgia, serif" font-style="italic" font-size="17" fill="#faf6ee">|ψ⟩ = <tspan fill="#e39280">α</tspan>|0⟩ + <tspan fill="#e39280">β</tspan>|1⟩</text>

  <!-- Constraint caption -->
  <text x="240" y="72" font-family="'Iowan Old Style', Georgia, serif" font-style="italic" font-size="9" fill="#8a857c"><tspan fill="#b09a82">|α|² + |β|² = 1</tspan></text>

  <!-- Decorative particles -->
  <circle cx="420" cy="20" r="1.6" fill="#e39280" opacity="0.7"/>
  <circle cx="455" cy="28" r="1" fill="#e39280" opacity="0.4"/>
  <circle cx="480" cy="22" r="1.3" fill="#e39280" opacity="0.5"/>
  <circle cx="435" cy="68" r="1" fill="#d3cdc1" opacity="0.35"/>
  <circle cx="470" cy="74" r="1.3" fill="#d3cdc1" opacity="0.45"/>
</svg>
